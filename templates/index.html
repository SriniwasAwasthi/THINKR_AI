<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THINKR AI - The Future of Intelligence</title>
    <meta name="description" content="THINKR AI: Next-generation artificial intelligence solutions.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header>
            <h1 class="logo">THINKR <span class="accent">AI</span></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="study-plan.html">Study Plan</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="hero">
                <div class="hero-content">
                    <h2>Unleash Next-Gen Intelligence</h2>
                    <p>Experience the power of advanced neural networks simplified for your everyday workflows.</p>
                    <button id="getStartedBtn" class="cta-button">Get Started</button>
                </div>
                <div class="interactive-element" id="aiVisualizer" style="position: relative;">
                    <div class="orb" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;"></div>
                    <img src="../static/images/hero.png" alt="THINKR Workspace" style="width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); z-index: 2; position: relative;">
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 THINKR AI. All rights reserved.</p>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/supabase-config.js"></script>
    <script src="../static/script.js"></script>
    <!-- AI Agent Widget -->
    <div id="ai-agent-widget" class="ai-agent-widget">
        <div class="agent-chat-window" id="agentChatWindow">
            <div class="agent-header">
                <div class="agent-status-orb"></div>
                <span>THINKR Core</span>
                <button id="closeAgentBtn" class="close-btn">&times;</button>
            </div>
            <div class="agent-messages" id="agentMessages"></div>
            <div class="agent-input-area">
                <input type="text" id="agentInput" placeholder="Ask THINKR...">
                <button id="agentSendBtn">Send</button>
            </div>
        </div>
        <div class="agent-trigger" id="agentTrigger">
            <div class="agent-trigger-orb"></div>
        </div>
    </div>
</body>
</html>

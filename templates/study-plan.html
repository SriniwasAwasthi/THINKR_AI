<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Plan - THINKR AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header>
            <h1 class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">THINKR <span class="accent">AI</span></a></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="study-plan.html">Study Plan</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="dashboard-grid">
                <div class="card" style="height: fit-content; padding: 0; overflow: hidden;">
                    <img src="../static/images/schedule.png" alt="Student Planning Schedule" style="width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                    <div style="padding: 2rem;">
                        <h2 style="margin-bottom: 1.5rem;">Generate Plan</h2>
                        <form id="studyPlanForm">
                            <div class="form-group">
                                <label for="subjects">Subjects (comma separated)</label>
                                <input type="text" id="subjects" required placeholder="Math, Physics, History">
                            </div>
                            <div class="form-group">
                                <label for="time">Time Available per Day (Hours)</label>
                                <input type="number" id="time" min="1" max="24" required placeholder="e.g. 3">
                            </div>
                            <button type="submit" class="cta-button" style="width: 100%; margin-top: 1rem;" id="generateBtn">Generate AI Plan</button>
                        </form>
                    </div>
                </div>
                
                <div class="card" id="planResultContainer" style="display: none;">
                    <h2 style="margin-bottom: 1.5rem;">Your AI Study Plan</h2>
                    <div id="planTimeline" class="timeline">
                        <!-- Dynamic content will be injected here -->
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 THINKR AI. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/supabase-config.js"></script>
    <script src="../static/script.js"></script>
    <script>
        document.getElementById('studyPlanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const subjectsInput = document.getElementById('subjects').value;
            const timeInput = document.getElementById('time').value;
            const container = document.getElementById('planResultContainer');
            const timeline = document.getElementById('planTimeline');
            
            // Loading state
            btn.textContent = 'Generating...';
            btn.style.opacity = '0.8';
            timeline.innerHTML = '';
            
            setTimeout(async () => {
                btn.textContent = 'Generate AI Plan';
                btn.style.opacity = '1';
                container.style.display = 'block';
                
                const subjects = subjectsInput.split(',').map(s => s.trim()).filter(s => s);
                const timePerSubject = Math.max(1, Math.floor((timeInput * 60) / subjects.length)); // Time in minutes
                
                let html = '';
                let currentTime = new Date();
                currentTime.setHours(9, 0, 0, 0); // Start at 9 AM
                
                subjects.forEach((subject, index) => {
                    const startTimeStr = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    currentTime.setMinutes(currentTime.getMinutes() + timePerSubject);
                    const endTimeStr = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    html += `
                        <div class="timeline-item" style="animation-delay: ${index * 0.2}s">
                            <div class="timeline-time">${startTimeStr} - ${endTimeStr}</div>
                            <div class="timeline-content">
                                <h4>${subject}</h4>
                                <p style="color: #a3a3a3; font-size: 0.9rem; margin-top: 0.5rem;">Deep focus session on ${subject}. Generated optimal learning pathway based on cognitive intervals.</p>
                            </div>
                        </div>
                    `;
                    
                    // Add 15 min break
                    if (index < subjects.length - 1) {
                        const breakStart = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        currentTime.setMinutes(currentTime.getMinutes() + 15);
                        const breakEnd = currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        html += `
                            <div class="timeline-item" style="animation-delay: ${index * 0.2 + 0.1}s">
                                <div class="timeline-time" style="color: #a3a3a3;">${breakStart} - ${breakEnd}</div>
                                <div class="timeline-content" style="background: transparent; border: 1px dashed rgba(255,255,255,0.1);">
                                    <h4 style="color: #a3a3a3;">Rest & Consolidation</h4>
                                </div>
                            </div>
                        `;
                    }
                });
                
                timeline.innerHTML = html;

                // ✅ Save plan to localStorage for profile page
                const planData = {
                    subjects: subjects.map((name, i) => ({
                        name: name,
                        time: new Date(new Date().setHours(9 + Math.floor(i * timeInput / subjects.length), 0, 0, 0))
                            .toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    })),
                    generatedAt: new Date().toLocaleString()
                };
                localStorage.setItem('thinkr_last_plan', JSON.stringify(planData));
                // Increment plan count
                const prevCount = parseInt(localStorage.getItem('thinkr_plan_count') || '0');
                localStorage.setItem('thinkr_plan_count', prevCount + 1);
                console.log('Plan saved to localStorage:', planData);

                // --- Supabase Save Logic (also saves to DB if logged in) ---
                try {
                    const user = await getCurrentUser();
                    if (user) {
                        const { error } = await supabase.from('study_plans').insert([{
                            user_id: user.id,
                            plan_details: JSON.stringify({ subjects: subjects, time: timeInput })
                        }]);
                        if (error) {
                            console.error('Supabase save error:', error);
                        } else {
                            console.log('Plan also saved to Supabase!');
                        }
                    }
                } catch(dbErr) {
                    console.warn('Could not save to Supabase (user may not be logged in):', dbErr);
                }
                
            }, 1200); // Simulate network request/processing
        });
    </script>
    <!-- AI Agent Widget -->
    <div id="ai-agent-widget" class="ai-agent-widget">
        <div class="agent-chat-window" id="agentChatWindow">
            <div class="agent-header">
                <div class="agent-status-orb"></div>
                <span>THINKR Core</span>
                <button id="closeAgentBtn" class="close-btn">&times;</button>
            </div>
            <div class="agent-messages" id="agentMessages"></div>
            <div class="agent-input-area">
                <input type="text" id="agentInput" placeholder="Ask THINKR...">
                <button id="agentSendBtn">Send</button>
            </div>
        </div>
        <div class="agent-trigger" id="agentTrigger">
            <div class="agent-trigger-orb"></div>
        </div>
    </div>
</body>
</html>
